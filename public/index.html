<!DOCTYPE html>

<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>MODULE — المساعد الداخلي</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
 :root {
   --dark: #2A2A2A; --gray: #666; --lgray: #999;
   --border: #D5CFC8; --cream: #F1ECE6; --surface: #EDEAE4;
   --sage: #A7AC91; --white: #FFFFFF;
   --font: 'IBM Plex Sans Arabic', sans-serif;
   --mono: 'IBM Plex Mono', monospace;
 }
 * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
 body { font-family:var(--font); background:var(--cream); color:var(--dark); min-height:100vh; display:flex; flex-direction:column; }

header { background:var(–dark); padding:12px 20px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
.logo { font-family:var(–mono); font-size:16px; font-weight:500; color:var(–white); letter-spacing:4px; }
.header-sub { font-size:10px; color:#888; margin-top:2px; }
.lang-toggle { display:flex; gap:6px; }
.lang-btn { font-family:var(–font); font-size:12px; padding:6px 12px; border:1px solid #444; background:transparent; color:#888; cursor:pointer; border-radius:4px; }
.lang-btn.active { background:var(–sage); border-color:var(–sage); color:var(–white); }

.chat-area { flex:1; display:flex; flex-direction:column; max-width:800px; width:100%; margin:0 auto; padding:0 16px; }
.messages { flex:1; overflow-y:auto; padding:20px 0; display:flex; flex-direction:column; gap:14px; min-height:calc(100vh - 180px); }

.welcome { text-align:center; padding:60px 20px; margin:auto; }
.welcome-logo { font-family:var(–mono); font-size:24px; font-weight:500; letter-spacing:8px; color:var(–dark); }
.welcome-line { width:32px; height:2px; background:var(–sage); margin:14px auto; }
.welcome h2 { font-size:18px; font-weight:500; margin-bottom:8px; }
.welcome p { font-size:13px; color:var(–gray); line-height:1.7; }

.msg { display:flex; gap:10px; animation:fadeIn 0.25s ease; }
@keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
.msg.user { flex-direction:row-reverse; }
.msg-av { width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:600; flex-shrink:0; margin-top:4px; }
.msg.user .msg-av { background:var(–dark); color:var(–white); }
.msg.assistant .msg-av { background:var(–sage); color:var(–white); font-family:var(–mono); font-size:8px; }
.msg-bubble { padding:12px 16px; border-radius:12px; font-size:14px; line-height:1.7; max-width:85%; }
.msg.user .msg-bubble { background:var(–dark); color:var(–white); border-radius:16px 4px 16px 16px; }
.msg.assistant .msg-bubble { background:var(–white); border:1px solid var(–border); border-radius:4px 16px 16px 16px; }
.msg-bubble p { margin-bottom:6px; } .msg-bubble p:last-child { margin-bottom:0; }

.typing { display:flex; gap:4px; padding:12px 16px; background:var(–white); border:1px solid var(–border); border-radius:4px 16px 16px 16px; width:fit-content; }
.typing span { width:6px; height:6px; background:var(–lgray); border-radius:50%; animation:bounce 1.2s infinite; }
.typing span:nth-child(2){animation-delay:.2s} .typing span:nth-child(3){animation-delay:.4s}
@keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }

.input-area { padding:12px 0 20px; background:var(–cream); position:sticky; bottom:0; }
.input-row { display:flex; gap:8px; align-items:flex-end; background:var(–white); border:1px solid var(–border); border-radius:12px; padding:8px 8px 8px 12px; }
.input-box { flex:1; font-family:var(–font); font-size:15px; border:none; background:transparent; color:var(–dark); resize:none; min-height:24px; max-height:100px; line-height:1.5; direction:auto; outline:none; }
.send-btn { width:40px; height:40px; background:var(–dark); border:none; border-radius:8px; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:background .2s; -webkit-appearance:none; appearance:none; }
.send-btn:active { background:var(–sage); }
.send-btn svg { width:18px; height:18px; fill:var(–white); }

.quick-pills { display:flex; gap:8px; overflow-x:auto; padding:8px 0; scrollbar-width:none; }
.quick-pills::-webkit-scrollbar { display:none; }
.pill { flex-shrink:0; padding:8px 14px; background:var(–white); border:1px solid var(–border); border-radius:20px; font-family:var(–font); font-size:12px; color:var(–dark); cursor:pointer; white-space:nowrap; -webkit-appearance:none; }
.pill:active { background:var(–surface); }
</style>

</head>
<body>
<header>
<div>
<div class="logo">MODULE</div>
<div class="header-sub">النظام الداخلي — Internal Assistant</div>
</div>
<div class="lang-toggle">
<button class="lang-btn active" onclick="setLang('ar')" id="btn-ar">عربي</button>
<button class="lang-btn" onclick="setLang('en')" id="btn-en">EN</button>
</div>
</header>

<div class="chat-area">
<div class="messages" id="messages">
<div class="welcome" id="welcome">
<div class="welcome-logo">MODULE</div>
<div class="welcome-line"></div>
<h2 id="w-title">مرحباً — كيف أساعدك؟</h2>
<p id="w-sub">اسألني عن أي إجراء، سياسة، أو قرار في موديول.</p>
</div>
</div>

<div class="input-area">
<div class="quick-pills" id="pills">
<button class="pill" onclick="quickAsk('وش أسوي لو العميل ما رد بعد 5 أيام؟')">العميل ما رد</button>
<button class="pill" onclick="quickAsk('فيه أمر تغيير — وش الإجراء؟')">أمر تغيير</button>
<button class="pill" onclick="quickAsk('ما عندي مشروع — وش أسوي؟')">ما عندي مشروع</button>
<button class="pill" onclick="quickAsk('وش صلاحياتي؟')">صلاحياتي</button>
<button class="pill" onclick="quickAsk('كيف أقدم طلب إجازة؟')">طلب إجازة</button>
<button class="pill" onclick="quickAsk('متى اجتماعات الأسبوع؟')">الاجتماعات</button>
</div>
<div class="input-row">
<textarea class="input-box" id="input" placeholder="اكتب سؤالك..." rows="1"
       oninput="autoResize(this)"></textarea>
<button class="send-btn" id="sendBtn" onclick="send()">
<svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
</button>
</div>
</div>
</div>

<script>
let history = [], loading = false;

function autoResize(el) {
 el.style.height = 'auto';
 el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

document.getElementById('input').addEventListener('keydown', function(e) {
 if (e.key === 'Enter' && !e.shiftKey && window.innerWidth > 600) {
   e.preventDefault();
   send();
 }
});

function setLang(l) {
 document.getElementById('btn-ar').classList.toggle('active', l==='ar');
 document.getElementById('btn-en').classList.toggle('active', l==='en');
 document.documentElement.dir = l==='ar' ? 'rtl' : 'ltr';
 if(l==='ar') {
   document.getElementById('w-title').textContent = 'مرحباً — كيف أساعدك؟';
   document.getElementById('w-sub').textContent = 'اسألني عن أي إجراء، سياسة، أو قرار في موديول.';
   document.getElementById('input').placeholder = 'اكتب سؤالك...';
 } else {
   document.getElementById('w-title').textContent = 'Hello — How can I help?';
   document.getElementById('w-sub').textContent = 'Ask me about any procedure, policy, or decision at MODULE.';
   document.getElementById('input').placeholder = 'Type your question...';
 }
}

function quickAsk(t) {
 document.getElementById('input').value = t;
 send();
}

async function send() {
 const input = document.getElementById('input');
 const text = input.value.trim();
 if (!text || loading) return;

 const welcome = document.getElementById('welcome');
 if (welcome) welcome.remove();

 addMsg('user', text);
 history.push({role:'user', content:text});
 input.value = '';
 input.style.height = 'auto';
 loading = true;

 const tid = showTyping();
 try {
   const res = await fetch('/api/chat', {
     method: 'POST',
     headers: {'Content-Type': 'application/json'},
     body: JSON.stringify({messages: history})
   });
   removeTyping(tid);
   const data = await res.json();
   if (!res.ok) throw new Error(data.error || 'Error');
   addMsg('assistant', data.reply);
   history.push({role:'assistant', content:data.reply});
 } catch(e) {
   removeTyping(tid);
   addMsg('assistant', '⚠️ ' + e.message, true);
 }
 loading = false;
}

function addMsg(role, text, raw=false) {
 const msgs = document.getElementById('messages');
 const d = document.createElement('div');
 d.className = 'msg ' + role;
 const av = document.createElement('div');
 av.className = 'msg-av';
 av.textContent = role === 'user' ? 'أنت' : 'M';
 const b = document.createElement('div');
 b.className = 'msg-bubble';
 if (raw) { b.textContent = text; }
 else {
   const f = text.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\n\n/g,'</p><p>').replace(/\n/g,'<br>');
   b.innerHTML = '<p>' + f + '</p>';
 }
 d.appendChild(av); d.appendChild(b);
 msgs.appendChild(d);
 msgs.scrollTop = msgs.scrollHeight;
}

function showTyping() {
 const msgs = document.getElementById('messages');
 const d = document.createElement('div');
 const id = 't' + Date.now(); d.id = id; d.className = 'msg assistant';
 d.innerHTML = '<div class="msg-av" style="background:var(--sage);color:var(--white);font-family:var(--mono);font-size:8px;">M</div><div class="typing"><span></span><span></span><span></span></div>';
 msgs.appendChild(d); msgs.scrollTop = msgs.scrollHeight;
 return id;
}
function removeTyping(id) { const e = document.getElementById(id); if(e) e.remove(); }
</script>

</body>
</html>
