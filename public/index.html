<!DOCTYPE html>

<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>MODULE — المساعد الداخلي</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
 --cream: #F1ECE6;
 --surface: #EDEAE4;
 --sage: #A7AC91;
 --warm: #DBBA9E;
 --dark: #2A2A2A;
 --border: #D5CFC8;
 --text: #3A3A3A;
 --muted: #8A8880;
 --green: #6B8F6B;
}

- { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
font-family: ‘DM Sans’, sans-serif;
background: var(–cream);
color: var(–text);
min-height: 100vh;
display: flex;
flex-direction: column;
}

.header {
background: var(–dark);
color: var(–cream);
padding: 14px 20px;
display: flex;
align-items: center;
justify-content: space-between;
position: sticky;
top: 0;
z-index: 100;
}

.logo {
font-family: ‘DM Serif Display’, serif;
font-size: 18px;
letter-spacing: 0.1em;
}

.dept-pill {
background: var(–sage);
color: var(–dark);
padding: 4px 12px;
border-radius: 20px;
font-size: 12px;
font-weight: 500;
display: none;
cursor: pointer;
border: none;
font-family: ‘DM Sans’, sans-serif;
}

/* WELCOME */
#welcome-screen {
flex: 1;
display: flex;
flex-direction: column;
justify-content: center;
align-items: center;
padding: 32px 20px;
gap: 28px;
}

.welcome-top { text-align: center; }

.welcome-title {
font-family: ‘DM Serif Display’, serif;
font-size: 26px;
color: var(–dark);
margin-bottom: 8px;
}

.welcome-sub {
font-size: 14px;
color: var(–muted);
line-height: 1.6;
max-width: 300px;
margin: 0 auto;
}

.select-wrapper {
width: 100%;
max-width: 360px;
display: flex;
flex-direction: column;
gap: 10px;
}

.select-label {
font-size: 12px;
color: var(–muted);
letter-spacing: 0.05em;
}

.custom-select { position: relative; }

.custom-select select {
width: 100%;
padding: 14px 16px;
padding-left: 36px;
background: white;
border: 1.5px solid var(–border);
border-radius: 12px;
font-size: 15px;
font-family: ‘DM Sans’, sans-serif;
color: var(–text);
appearance: none;
-webkit-appearance: none;
cursor: pointer;
outline: none;
transition: border-color 0.2s;
direction: rtl;
}

.custom-select select:focus { border-color: var(–sage); }

.custom-select::after {
content: ‘↓’;
position: absolute;
left: 14px;
top: 50%;
transform: translateY(-50%);
color: var(–muted);
pointer-events: none;
font-size: 13px;
}

.name-input {
width: 100%;
padding: 14px 16px;
background: white;
border: 1.5px solid var(–border);
border-radius: 12px;
font-size: 15px;
font-family: ‘DM Sans’, sans-serif;
color: var(–text);
outline: none;
transition: border-color 0.2s;
direction: rtl;
}

.name-input:focus { border-color: var(–sage); }
.name-input::placeholder { color: var(–muted); }

.start-btn {
width: 100%;
background: var(–dark);
color: var(–cream);
border: none;
padding: 15px;
border-radius: 12px;
font-size: 15px;
font-family: ‘DM Sans’, sans-serif;
cursor: pointer;
opacity: 0.4;
pointer-events: none;
transition: opacity 0.2s;
}

.start-btn.ready { opacity: 1; pointer-events: all; }

/* CHAT */
#chat-screen {
display: none;
flex-direction: column;
flex: 1;
height: calc(100vh - 52px);
}

.messages {
flex: 1;
overflow-y: auto;
padding: 20px 16px;
display: flex;
flex-direction: column;
gap: 14px;
-webkit-overflow-scrolling: touch;
}

.welcome-bubble {
background: white;
border: 1px solid var(–border);
border-radius: 16px;
padding: 20px;
}

.wb-title {
font-family: ‘DM Serif Display’, serif;
font-size: 17px;
margin-bottom: 6px;
color: var(–dark);
}

.wb-text {
font-size: 13px;
color: var(–muted);
line-height: 1.7;
margin-bottom: 14px;
}

.quick-btns { display: flex; flex-wrap: wrap; gap: 7px; }

.qbtn {
background: var(–surface);
border: 1px solid var(–border);
border-radius: 20px;
padding: 6px 13px;
font-size: 12px;
cursor: pointer;
font-family: ‘DM Sans’, sans-serif;
color: var(–text);
transition: all 0.15s;
white-space: nowrap;
}

.qbtn:active { background: var(–warm); border-color: var(–warm); }

.msg { max-width: 90%; animation: up 0.25s ease; }
.msg.user { align-self: flex-start; }
.msg.assistant { align-self: flex-end; }

@keyframes up {
from { opacity: 0; transform: translateY(6px); }
to { opacity: 1; transform: translateY(0); }
}

.bubble {
padding: 11px 15px;
border-radius: 16px;
font-size: 14px;
line-height: 1.7;
}

.msg.user .bubble {
background: var(–dark);
color: var(–cream);
border-bottom-right-radius: 4px;
}

.msg.assistant .bubble {
background: white;
border: 1px solid var(–border);
color: var(–text);
border-bottom-left-radius: 4px;
}

.gap-tag {
display: inline-block;
background: #FEF3CD;
border: 1px solid #F0C04A;
color: #7D5A00;
padding: 3px 10px;
border-radius: 12px;
font-size: 11px;
font-weight: 500;
margin-bottom: 8px;
}

.typing {
align-self: flex-end;
background: white;
border: 1px solid var(–border);
border-radius: 16px;
border-bottom-left-radius: 4px;
padding: 13px 16px;
display: none;
}

.dots { display: flex; gap: 5px; }
.dots span {
width: 7px; height: 7px;
background: var(–muted);
border-radius: 50%;
animation: bounce 1.2s infinite;
}
.dots span:nth-child(2) { animation-delay: 0.2s; }
.dots span:nth-child(3) { animation-delay: 0.4s; }

@keyframes bounce {
0%,60%,100% { transform: translateY(0); }
30% { transform: translateY(-5px); }
}

.input-bar {
background: white;
border-top: 1px solid var(–border);
padding: 10px 14px;
display: flex;
gap: 10px;
align-items: flex-end;
}

textarea {
flex: 1;
background: var(–surface);
border: 1.5px solid var(–border);
border-radius: 12px;
padding: 10px 13px;
font-size: 14px;
font-family: ‘DM Sans’, sans-serif;
color: var(–text);
resize: none;
outline: none;
max-height: 100px;
line-height: 1.5;
direction: auto;
transition: border-color 0.2s;
}

textarea:focus { border-color: var(–sage); }
textarea::placeholder { color: var(–muted); }

.send {
background: var(–dark);
color: var(–cream);
border: none;
width: 40px;
height: 40px;
border-radius: 10px;
cursor: pointer;
font-size: 16px;
flex-shrink: 0;
display: flex;
align-items: center;
justify-content: center;
}

.send:disabled { opacity: 0.4; }
.messages::-webkit-scrollbar { width: 3px; }
.messages::-webkit-scrollbar-thumb { background: var(–border); border-radius: 2px; }
</style>

</head>
<body>

<div class="header">
<div class="logo">MODULE</div>
<button class="dept-pill" id="dept-pill" onclick="resetToWelcome()"></button>
</div>

<div id="welcome-screen">
<div class="welcome-top">
<div class="welcome-title">المساعد الداخلي</div>
<div class="welcome-sub">مبني على وثائق وسياسات موديول — يجاوب من مرجعية، لا من رأيه</div>
</div>

<div class="select-wrapper">
<div class="select-label">اختر قسمك</div>
<div class="custom-select">
<select id="dept-select" onchange="checkReady()">
<option value="">— اختر —</option>
<option value="design">✏️  التصميم — Design</option>
<option value="pmo">📊  إدارة المشاريع — PMO</option>
<option value="technical">🔧  الفني — Technical</option>
<option value="finance">💰  المالية — Finance</option>
<option value="hr">👥  الموارد البشرية — HR</option>
<option value="admin">🏢  الإدارة — Admin</option>
<option value="bd">🤝  التطوير والتسويق — BD</option>
<option value="all">🌐  عام — General</option>
</select>
</div>

```
<input class="name-input" id="name-input" type="text" placeholder="اسمك (اختياري)" oninput="checkReady()" />

<button class="start-btn" id="start-btn" onclick="startChat()">ابدأ ←</button>
```

</div>
</div>

<div id="chat-screen">
<div class="messages" id="messages">
<div class="welcome-bubble" id="wb">
<div class="wb-title" id="wb-title">مرحباً 👋</div>
<div class="wb-text" id="wb-text"></div>
<div class="quick-btns" id="quick-btns"></div>
</div>
</div>

<div class="typing" id="typing">
<div class="dots"><span></span><span></span><span></span></div>
</div>

<div class="input-bar">
<textarea id="txt" placeholder="اكتب سؤالك..." rows="1"
     onkeydown="handleKey(event)" oninput="resize(this)"></textarea>
<button class="send" id="send-btn" onclick="send()">↑</button>
</div>
</div>

<script>
const SHEET_URL = 'https://script.google.com/macros/s/AKfycbxTTNb9sNDbXsfpsm1Lzx5aHY_DOqfDPIj0lmT7korfGu8SdfFgC97V-iAyUZz5P204/exec';

const DEPTS = {
 design:    { ar: 'التصميم',          quick: ['مراحل المشروع','صلاحياتي','العميل ما رد','طلب VO','تجاوز الساعات','تسليم المرحلة'] },
 pmo:       { ar: 'إدارة المشاريع',   quick: ['تأخر العميل','مشروع جديد','مراقبة الساعات','الروتين الأسبوعي','تصعيد للمؤسس'] },
 technical: { ar: 'الفني',            quick: ['الاستشاريين الفرعيين','صلاحياتي','مراجعة فنية','تقييم العروض'] },
 finance:   { ar: 'المالية',          quick: ['حدود الصلاحيات','الرواتب والـ WPS','مراحل الدفع','طلب صرف'] },
 hr:        { ar: 'الموارد البشرية',  quick: ['طلب إجازة','أيام الإجازة','إجازة مرضية','إنهاء خدمة','فترة التجربة'] },
 admin:     { ar: 'الإدارة',          quick: ['صلاحياتي','استقبال العميل','طلب مستلزمات','الأرشفة'] },
 bd:        { ar: 'التطوير والتسويق', quick: ['رحلة العميل','مراحل العرض','صلاحيات العروض','العطاءات'] },
 all:       { ar: 'عام',              quick: ['طلب إجازة','صلاحياتي','مراحل المشروع','العميل ما رد','العمل عن بُعد'] }
};

let dept='', deptAr='', userName='', history=[], busy=false;

function sysPrompt() {
 return `أنت المساعد الداخلي لشركة موديول (MODULE) — مكتب هندسي ومعماري في الرياض.

## هويتك
تجيب فقط من وثائق وسياسات موديول الرسمية. لا تفتي من عندك.
إذا ما وجدت الإجابة — قل ذلك وابدأ بـ [GAP].
أسلوبك: مهني، واضح، محترم. أجب بنفس لغة السؤال.

## المؤسس
فهد غشيان — Founder. يحضر فقط في 4 لحظات مع العميل. لا يعطي تعليقات مباشرة — يطرح أسئلة فقط.

## القسم الحالي
المستخدم: ${userName||'غير محدد'} — القسم: ${deptAr} (${dept})

## الفريق
التصميم: داني (DM)، ريجاب (Lead A)، عياد (Lead B)، آدم، جودت، فيشنو
PMO: محمود — لا يتواصل مع المصممين مباشرة، كل شيء عبر داني
الفني: مجاهد، أحمد بريء | المالية: محمد | BD: فيصل، سلطان | HR: سارة

## مراحل المشروع (فيلا)
Pre-Design → Concept 120h → SD 120h → DD 120h → CD 80h → PMO 40h = 480h إجمالي

## الأرقام الأساسية
التكلفة الشهرية: 185,000 ريال | تكلفة الساعة: 120 ريال | طاقة الفريق: 1,548 ساعة/شهر | الهامش: 30%
نافذة مراجعة العميل: 5 أيام عمل

## ميزانية الساعات
فيلا 300k=1,645h | فيلا كبيرة 500k=2,742h | تجاري 500k=2,742h | مجمع 600k=3,290h | TOD 750k=3,675h | داخلي 150k=849h

## Utilization المستهدف
DM: 40% | Deputy DM: 75% | Team Leads: 80% | Senior+Architects: 85%

## تأخر العميل
يوم 1-5: 🟢 طبيعي | يوم 6: 🟡 Follow-up رسمي | يوم 11: 🔴 Reschedule + إبلاغ مؤسس | يوم 15: 🔴 Frozen

## صلاحيات
أقل من 5k ريال: رئيس القسم | 5k-20k: رئيس القسم يوصي + مؤسس يوافق | أكثر من 20k: مؤسس فقط
قبول مشروع / توقيع عقد / إنهاء خدمة: مؤسس فقط
إجازة 1-5 أيام: رئيس القسم | أكثر من 5 أيام: مؤسس

## HR
ساعات: الأحد-الخميس 9ص-6م
إجازة سنوية: 21 يوم (<5 سنوات)، 30 يوم (5+)
إجازة مرضية: 30 يوم كامل + 60 يوم 75% + 30 يوم بدون
إجازة زواج: 5 أيام | ولادة: 3 أيام | وفاة: 3 أيام | حج: 10 أيام
طلب الإجازة: 14 يوم مسبقاً عبر HR@module.sa

## Client Approval
Approved → أغلق المرحلة + فاتورة
Approved with Minor Comments → تُحل في المرحلة التالية
Not Approved → جولة جديدة أو VO

## VO
لا عمل قبل موافقة خطية + دفع. PMO يُصدر VO Impact Report خلال يوم، يُرسل خلال 3 أيام.

## ربحية
70%: 🟡 تنبيه DM | 90%: 🔴 إبلاغ مؤسس بـ3 أرقام | 100%+: لا نطاق إضافي بدون VO

## أسلوب الإجابة
سؤال واضح → أجب مباشرة واذكر المرجع
سؤال غامض → اسأل سؤالاً واحداً
وضع معقد → حاوره خطوة بخطوة
إجراء غير موجود → [GAP] + اسأل لتفهم المشكلة كاملاً`;
}

function checkReady() {
 const d = document.getElementById('dept-select').value;
 document.getElementById('start-btn').classList.toggle('ready', !!d);
}

function startChat() {
 dept = document.getElementById('dept-select').value;
 if (!dept) return;
 deptAr = DEPTS[dept].ar;
 userName = document.getElementById('name-input').value.trim();

 document.getElementById('welcome-screen').style.display = 'none';
 document.getElementById('chat-screen').style.display = 'flex';

 const pill = document.getElementById('dept-pill');
 pill.textContent = deptAr;
 pill.style.display = 'block';

 document.getElementById('wb-title').textContent = `مرحباً${userName?' '+userName:''} 👋`;
 document.getElementById('wb-text').textContent = `أنا مساعد قسم ${deptAr}. اسألني عن أي إجراء أو سياسة.`;

 const qb = document.getElementById('quick-btns');
 qb.innerHTML = '';
 DEPTS[dept].quick.forEach(q => {
   const b = document.createElement('button');
   b.className = 'qbtn'; b.textContent = q;
   b.onclick = () => { document.getElementById('txt').value = q; send(); };
   qb.appendChild(b);
 });

 history = [];
 document.getElementById('txt').focus();
}

function resetToWelcome() {
 document.getElementById('chat-screen').style.display = 'none';
 document.getElementById('welcome-screen').style.display = 'flex';
 document.getElementById('dept-pill').style.display = 'none';
 document.getElementById('dept-select').value = '';
 document.getElementById('name-input').value = '';
 document.getElementById('start-btn').classList.remove('ready');
 const msgs = document.getElementById('messages');
 while (msgs.children.length > 1) msgs.removeChild(msgs.lastChild);
 document.getElementById('wb').style.display = 'block';
 history = [];
}

function handleKey(e) {
 if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); send(); }
}

function resize(el) {
 el.style.height = 'auto';
 el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

async function send() {
 const txt = document.getElementById('txt');
 const text = txt.value.trim();
 if (!text || busy) return;

 txt.value = ''; txt.style.height = 'auto';
 busy = true;
 document.getElementById('send-btn').disabled = true;
 document.getElementById('wb').style.display = 'none';

 addMsg('user', text);
 history.push({ role: 'user', content: text });
 showTyping(true);
 scrollDown();

 try {
   const res = await fetch('/api/chat', {
     method: 'POST',
     headers: { 'Content-Type': 'application/json' },
     body: JSON.stringify({ messages: history, system: sysPrompt() })
   });

   const data = await res.json();
   const reply = data.content?.[0]?.text || data.error || 'حدث خطأ — حاول مرة ثانية.';
   history.push({ role: 'assistant', content: reply });
   showTyping(false);

   const isGap = reply.includes('[GAP]') || reply.toLowerCase().includes('[gap]');
   addMsg('assistant', reply, isGap);
   if (isGap) logGap(text, reply);

 } catch(e) {
   showTyping(false);
   addMsg('assistant', 'تعذّر الاتصال — تحقق من الاتصال وحاول مرة ثانية.');
 }

 busy = false;
 document.getElementById('send-btn').disabled = false;
 scrollDown();
}

function addMsg(role, text, isGap=false) {
 const msgs = document.getElementById('messages');
 const div = document.createElement('div');
 div.className = `msg ${role}`;
 const bubble = document.createElement('div');
 bubble.className = 'bubble';

 if (isGap && role==='assistant') {
   const tag = document.createElement('div');
   tag.className = 'gap-tag';
   tag.textContent = '⚠ GAP مكتشف — سيُوثَّق';
   bubble.appendChild(tag);
   bubble.appendChild(document.createElement('br'));
 }

 const clean = text.replace(/\[GAP\]:?/gi,'').trim();
 bubble.innerHTML += clean
   .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
   .replace(/\n\n/g,'<br><br>')
   .replace(/\n/g,'<br>');

 div.appendChild(bubble);
 msgs.appendChild(div);
}

function showTyping(show) {
 const t = document.getElementById('typing');
 t.style.display = show ? 'block' : 'none';
 if (show) document.getElementById('messages').appendChild(t);
 scrollDown();
}

function scrollDown() {
 const msgs = document.getElementById('messages');
 setTimeout(() => msgs.scrollTop = msgs.scrollHeight, 50);
}

async function logGap(question, reply) {
 try {
   await fetch(SHEET_URL, {
     method: 'POST', mode: 'no-cors',
     headers: { 'Content-Type': 'application/json' },
     body: JSON.stringify({
       timestamp: new Date().toISOString(),
       department: deptAr, department_en: dept,
       user: userName||'غير محدد',
       question, ai_response: reply.substring(0,500), type: 'GAP'
     })
   });
 } catch(e) {}
}
</script>
